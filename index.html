<body>
    <div id="loader" class="loader-container">
        <span class="loader"></span>
    </div>

    <div id="toast-container"></div>

    <div class="auth-container">
        <div class="auth-background-overlay"></div>
        <!-- Auth background mesh is handled in CSS -->
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Lab System Management</h1>
                <p class="auth-subtitle">Login to your account to continue</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="User Name" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="*******" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Sign up</a>
            </div>

        </div>
    </div>

    <script type="module">
        import { signIn, getCurrentUser } from './js/auth.js';

        async function init() {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = `${user.role}/dashboard.html`;
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const result = await signIn(username, password);
            if (result.success) {
                window.location.href = `${result.role}/dashboard.html`;
            }
        });

        init();
    </script>
</body>

</html>
