<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | LMS</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body>
    <div id="loader" class="loader-container">
        <span class="loader"></span>
    </div>
    <div id="toast-container"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo"><i data-lucide="monitor" class="i-icon"></i></span>
                <span class="sidebar-title">LMS</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <i data-lucide="layout-dashboard" class="i-icon"></i> Dashboard
                </a>
                <a href="report.html" class="nav-item">
                    <i data-lucide="alert-triangle" class="i-icon"></i> Report Issue
                </a>
                <a href="my-complaints.html" class="nav-item">
                    <i data-lucide="clipboard-list" class="i-icon"></i> My Reports
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="nav-item"
                    style="width: 100%; background: transparent; border: none; cursor: pointer;">
                    <i data-lucide="log-out" class="i-icon"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2 class="topbar-title">Welcome, <span id="student-name">...</span></h2>
                <div class="user-profile">
                    <div class="user-avatar" id="user-initials">ST</div>
                </div>
            </header>

            <div class="content-body">
                <div class="flex justify-between items-center mb-4">
                    <h3>Your Overview</h3>
                    <a href="report.html" class="btn btn-primary">Report New Issue</a>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <span class="stat-label">My Total Reports</span>
                            <span class="stat-value" id="stat-total">0</span>
                        </div>
                        <div class="stat-icon"><i data-lucide="clipboard-list" class="i-icon"></i></div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-info">
                            <span class="stat-label">Pending</span>
                            <span class="stat-value" id="stat-pending">0</span>
                        </div>
                        <div class="stat-icon"><i data-lucide="clock" class="i-icon"></i></div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-info">
                            <span class="stat-label">Resolved</span>
                            <span class="stat-value" id="stat-resolved">0</span>
                        </div>
                        <div class="stat-icon"><i data-lucide="check-circle" class="i-icon"></i></div>
                    </div>
                </div>

                <div class="table-card mt-3">
                    <div class="card-header">
                        <h3>Recent Updates</h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>System</th>
                                    <th>Issue</th>
                                    <th>Status</th>
                                    <th>Latest Update</th>
                                </tr>
                            </thead>
                            <tbody id="recent-updates-body">
                                <tr>
                                    <td colspan="4" class="text-center text-secondary">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { checkAuth } from '../js/router.js';
        import { signOut } from '../js/auth.js';
        import { db } from '../js/db.js';
        import { formatDate, showToast, escapeHTML, setupMobileMenu } from '../js/utils.js';

        let currentUser = null;

        async function init() {
            currentUser = await checkAuth('student');
            if (!currentUser) return;

            document.getElementById('student-name').textContent = currentUser.full_name;
            document.getElementById('user-initials').textContent = currentUser.full_name.split(' ').map(n => n[0]).join('').toUpperCase();

            fetchStats();
            fetchRecentUpdates();
        }

        async function fetchStats() {
            const [totalRes, pendingRes, resolvedRes] = await Promise.all([
                db.from('complaints').eq('student_id', currentUser.id),
                db.from('complaints').eq('student_id', currentUser.id).neq('status', 'resolved'),
                db.from('complaints').eq('student_id', currentUser.id).eq('status', 'resolved')
            ]);
            document.getElementById('stat-total').textContent = (totalRes.data || []).length;
            document.getElementById('stat-pending').textContent = (pendingRes.data || []).length;
            document.getElementById('stat-resolved').textContent = (resolvedRes.data || []).length;
        }

        async function fetchRecentUpdates() {
            const { data } = await db
                .from('complaints')
                .eq('student_id', currentUser.id)
                .order('updated_at', { ascending: false })
                .limit(5);

            const tbody = document.getElementById('recent-updates-body');

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary">No reports yet.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>
                        <div class="font-bold">${escapeHTML(c.systems && c.systems.labs ? c.systems.labs.name : 'N/A')}</div>
                        <div class="text-secondary small">SN: ${escapeHTML(c.systems ? c.systems.serial_number : 'N/A')}</div>
                    </td>
                    <td>${escapeHTML(c.title)}</td>
                    <td><span class="badge badge-${getStatusClass(c.status)}">${c.status.replace('_', ' ')}</span></td>
                    <td>${formatDate(c.updated_at || c.created_at)}</td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'open') return 'danger';
            if (status === 'in_progress') return 'warning';
            if (status === 'resolved') return 'success';
            return 'info';
        }

        document.getElementById('logout-btn').addEventListener('click', signOut);

        init();
        lucide.createIcons();
    </script>
</body>

</html>
