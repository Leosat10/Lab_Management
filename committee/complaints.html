<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Complaints | Lab System</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
    <script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body>
    <div id="loader" class="loader-container">
        <span class="loader"></span>
    </div>
    <div id="toast-container"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">

                <span class="sidebar-title">COMMITTEE</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i data-lucide="layout-dashboard" class="i-icon"></i> Dashboard
                </a>
                <a href="complaints.html" class="nav-item active">
                    <i data-lucide="clipboard-list" class="i-icon"></i> Complaints
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="nav-item"
                    style="width: 100%; background: transparent; border: none; cursor: pointer;">
                    <i data-lucide="log-out" class="i-icon"></i> Logout
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h2 class="topbar-title">All Complaints</h2>
            </header>

            <div class="content-body">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex gap-2">
                        <select id="status-filter" class="form-control" style="width: 150px;">
                            <option value="all">All Status</option>
                            <option value="open">Open</option>
                            <option value="in_progress">In-Progress</option>
                            <option value="resolved">Resolved</option>
                        </select>
                        <input type="text" id="search-box" class="form-control" placeholder="Search title or SN..."
                            style="width: 250px;">
                    </div>
                </div>

                <div class="table-card">
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Lab / SN</th>
                                    <th>Student</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="complaints-body">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { checkAuth } from '../js/router.js';
        import { signOut } from '../js/auth.js';
        import { db } from '../js/db.js';
        import { showLoader, hideLoader, formatDate } from '../js/utils.js';

        async function init() {
            const user = await checkAuth('committee');
            if (!user) return;
            fetchComplaints();
        }

        async function fetchComplaints() {
            showLoader();
            const status = document.getElementById('status-filter').value;
            const search = document.getElementById('search-box').value.toLowerCase();

            let query = db.from('complaints').order('created_at', { ascending: false });
            if (status !== 'all') query = query.eq('status', status);

            const { data } = await query;

            if (data) {
                const filtered = data.filter(c =>
                    c.title.toLowerCase().includes(search) ||
                    (c.systems && c.systems.serial_number.toLowerCase().includes(search))
                );

                const tbody = document.getElementById('complaints-body');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary">No complaints found.</td></tr>';
                } else {
                    tbody.innerHTML = filtered.map(c => `
                        <tr>
                            <td>
                                <div class="font-bold">${escapeHTML(c.title)}</div>
                                <div class="text-secondary small">${escapeHTML(c.category)} • ${formatDate(c.created_at)}</div>
                            </td>
                            <td>
                                <div>${escapeHTML(c.systems && c.systems.labs ? c.systems.labs.name : 'N/A')}</div>
                                <div class="text-secondary small">SN: ${escapeHTML(c.systems ? c.systems.serial_number : 'N/A')}</div>
                            </td>
                            <td>${escapeHTML(c.profiles ? c.profiles.full_name : 'Unknown User')}</td>
                            <td><span class="badge badge-${getPriorityClass(c.priority)}">${c.priority}</span></td>
                            <td><span class="badge badge-${getStatusClass(c.status)}">${c.status.replace('_', ' ')}</span></td>
                            <td>
                                <a href="lab-detail.html?lab_id=${c.systems ? c.systems.lab_id : ''}" class="btn btn-sm btn-outline">View</a>
                            </td>
                        </tr>
                    `).join('');
                }
            }
            hideLoader();
        }

        function getPriorityClass(p) {
            if (p === 'critical' || p === 'high') return 'danger';
            if (p === 'medium') return 'warning';
            return 'info';
        }

        function getStatusClass(s) {
            if (s === 'open') return 'danger';
            if (s === 'in_progress') return 'warning';
            if (s === 'resolved') return 'success';
            return 'info';
        }

        document.getElementById('status-filter').addEventListener('change', fetchComplaints);
        document.getElementById('search-box').addEventListener('input', fetchComplaints);
        document.getElementById('logout-btn').addEventListener('click', signOut);

        init();
        lucide.createIcons();
    </script>
</body>

</html>
